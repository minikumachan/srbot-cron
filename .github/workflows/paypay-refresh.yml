name: PayPay Token Refresh (GitHub App auth)

# Runs on GitHub Actions for FREE (public repo = unlimited minutes)
# but checks out the private source using an ephemeral GitHub App token
# (10-minute lifetime, auto-renewed per run). The public repo never
# holds a long-lived PAT.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: paypay-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env so every step (including `prisma generate`, which
    # reads DATABASE_URL via prisma.config.ts) sees the right values.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CIPHER_KEY: ${{ secrets.CIPHER_KEY }}
      CRYPTO_SECRET_KEY: ${{ secrets.CRYPTO_SECRET_KEY }}
      PROXY_WORKER_URL: ${{ secrets.PROXY_WORKER_URL }}
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      # STRICT_PROXY auto-enables once PROXY_WORKER_URL is configured.
      # Before the Worker is deployed, fall back to direct egress so the
      # GHA bootstrap run can still validate the pipeline.
      STRICT_PROXY: ${{ secrets.PROXY_WORKER_URL != '' && '1' || '0' }}
      NODE_ENV: production
    steps:
      - name: Mint ephemeral App token (10-min lifetime)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # owner / repository are resolved from `secrets.PRIVATE_REPO`
          # (format: "owner/repo") so neither the handle nor the repo
          # name appear in this public file.
          owner: ${{ github.repository_owner }}
          repositories: ${{ secrets.PRIVATE_REPO_NAME }}

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --include=dev --prefer-offline --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run refresh daemon
        run: npx ts-node -r tsconfig-paths/register scripts/refresh-paypay-tokens.ts
