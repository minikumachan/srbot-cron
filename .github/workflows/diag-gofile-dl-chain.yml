name: Diag — GoFile full DL chain
on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: GoFile folder UUID
        default: "cddaf778-9a54-49ae-8d2b-ff993ab169b5"
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Runner IP
        run: curl -s https://api.ipify.org; echo
      - name: Probe DL chain (v2 — with X-BL + ?cache=true)
        env:
          FOLDER_ID: ${{ inputs.folder_id }}
        run: |
          set -u
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"

          echo "=== [1] POST /accounts ==="
          ACCT=$(curl -sS -X POST https://api.gofile.io/accounts \
            -H "User-Agent: $UA" -H "Origin: https://gofile.io" -H "Referer: https://gofile.io/")
          echo "$ACCT"
          TOKEN=$(node -e "let b='';process.stdin.on('data',d=>b+=d).on('end',()=>{try{console.log(JSON.parse(b).data.token)}catch(e){}})" <<< "$ACCT")
          echo "TOKEN=$TOKEN"

          echo
          echo "=== [2] compute self X-Website-Token (SHA256, salt=gf2026x) ==="
          TS=$(( $(date +%s) / 14400 ))
          RAW="${UA}::en-US::${TOKEN}::${TS}::gf2026x"
          WT=$(printf '%s' "$RAW" | openssl dgst -sha256 -hex | awk '{print $NF}')
          echo "TimeSlot=$TS  WT=$WT"

          URL="https://api.gofile.io/contents/$FOLDER_ID?contentFilter=&page=1&pageSize=1000&sortField=name&sortDirection=1"
          URL_CACHE="${URL}&cache=true"

          echo
          echo "=== [3A] vanilla — bearer only, no wt, no X-BL, no cache ==="
          curl -sS -o /tmp/a.txt -w "status=%{http_code}\n" "$URL" \
            -H "Authorization: Bearer $TOKEN" -H "User-Agent: $UA" \
            -H "Origin: https://gofile.io" -H "Referer: https://gofile.io/"
          head -c 200 /tmp/a.txt; echo

          echo
          echo "=== [3B] + X-Website-Token (self) ==="
          curl -sS -o /tmp/b.txt -w "status=%{http_code}\n" "$URL" \
            -H "Authorization: Bearer $TOKEN" -H "X-Website-Token: $WT" -H "User-Agent: $UA" \
            -H "Origin: https://gofile.io" -H "Referer: https://gofile.io/"
          head -c 200 /tmp/b.txt; echo

          echo
          echo "=== [3C] + wt + X-BL: en-US ==="
          curl -sS -o /tmp/c.txt -w "status=%{http_code}\n" "$URL" \
            -H "Authorization: Bearer $TOKEN" -H "X-Website-Token: $WT" -H "X-BL: en-US" -H "User-Agent: $UA" \
            -H "Origin: https://gofile.io" -H "Referer: https://gofile.io/"
          head -c 200 /tmp/c.txt; echo

          echo
          echo "=== [3D] + wt + X-BL + ?cache=true (spec from report) ==="
          curl -sS -o /tmp/d.txt -w "status=%{http_code}\n" "$URL_CACHE" \
            -H "Authorization: Bearer $TOKEN" -H "X-Website-Token: $WT" -H "X-BL: en-US" -H "User-Agent: $UA" \
            -H "Origin: https://gofile.io" -H "Referer: https://gofile.io/"
          head -c 600 /tmp/d.txt; echo

          echo
          echo "=== [4] if 3D OK: pick a link and HEAD it with Cookie ==="
          PICK=$(node -e "const fs=require('fs');try{const j=JSON.parse(fs.readFileSync('/tmp/d.txt','utf8'));const ch=j.data&&j.data.children||{};for(const k in ch){const c=ch[k];if(c&&c.link){console.log(c.link);break}}}catch(e){}")
          echo "PICK=$PICK"
          if [ -n "$PICK" ]; then
            curl -sSI -o /tmp/h.txt -w "status=%{http_code}\n" "$PICK" \
              -H "User-Agent: $UA" -H "Referer: https://gofile.io/" -H "Cookie: accountToken=$TOKEN"
            head -30 /tmp/h.txt
          fi
